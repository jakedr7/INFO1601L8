<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHANGE TITLE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #11151a;
      color: white;
    }

    header {
      background-color: #3f51b5;
      text-align: center;
      padding: 20px;
    }

    .controls {
      width: 90%;
      margin: 20px auto;
      text-align: center;
    }

    .controls input {
      width: 250px;
      padding: 10px;
      font-size: 16px;
    }

    .controls button {
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      background-color: #3f51b5;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    #message {
      text-align: center;
      font-size: 18px;
      margin: 10px 0;
    }

    #result {
      width: 90%;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: #161b22;
      border: 1px solid #444;
      border-radius: 10px;
      overflow: hidden;
      padding-bottom: 10px;
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .card h3 {
      margin: 10px;
      font-size: 18px;
    }

    .card p {
      margin: 6px 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>CHANGE HEADING</h1>
    <p>CHANGE SHORT TEXT</p>
  </header>

  <section class="controls">
    <input type="text" id="searchInput" placeholder="Search here">
    <button onclick="searchItems()">Search</button>
    <button onclick="showAll()">Clear</button>
  </section>

  <p id="message">Loading...</p>

  <div id="result"></div>

  <script>
    // store all API data
    let state = [];

    function getData() {
      // put API url here
      fetch("PUT_API_URL_HERE")
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          // change this if data is inside another property
          // examples: data, data.data, data.message, data.results
          state = data;
          drawGallery(state);
        })
        .catch(function(error) {
          document.getElementById("message").innerHTML = "Failed to load data.";
          console.log(error);
        });
    }

    function drawGallery(records) {
      let result = document.getElementById("result");
      let message = document.getElementById("message");
      let html = "";

      if (records.length === 0) {
        result.innerHTML = "";
        message.innerHTML = "No results found.";
        return;
      }

      for (let item of records) {
        html += `
          <div class="card">
            <!-- change image field -->
            <img src="${item.image}" alt="${item.title}">

            <!-- change title field -->
            <h3>${item.title}</h3>

            <!-- change info fields -->
            <p>${item.info1}</p>
            <p>${item.info2}</p>
            <p>${item.info3}</p>
          </div>
        `;
      }

      result.innerHTML = html;
      message.innerHTML = "Showing " + records.length + " items";
    }

    function searchItems() {
      let text = document.getElementById("searchInput").value.toUpperCase();
      let filtered = [];

      for (let item of state) {
        // change title field if needed
        if (item.title.toUpperCase().indexOf(text) !== -1) {
          filtered.push(item);
        }
      }

      drawGallery(filtered);
    }

    function showAll() {
      document.getElementById("searchInput").value = "";
      drawGallery(state);
    }

    getData();
  </script>
</body>
</html>
