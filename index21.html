<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Gallery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #11151a;
      color: white;
    }

    nav {
      background-color: #3f51b5;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    nav h1 {
      color: white;
      margin: 0;
      flex: 1;
    }

    nav input,
    nav select {
      padding: 8px;
      font-size: 16px;
    }

    #message {
      text-align: center;
      margin: 15px 0;
      font-size: 18px;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 15px;
      justify-content: center;
    }

    .card {
      border: 1px solid #444;
      border-radius: 10px;
      width: 220px;
      background-color: #161b22;
      overflow: hidden;
      padding-bottom: 10px;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      display: block;
      background-color: white;
    }

    .card p,
    .card h3 {
      margin: 8px 10px;
    }

    .card a {
      display: inline-block;
      margin: 8px 10px;
      color: #8ab4ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav>
    <h1>Amazon Gallery</h1>

    <select id="categorySelect" onchange="changeCategory(this)">
      <option>Loading categories...</option>
    </select>

    <input type="text" id="search" placeholder="Search..." oninput="handleSearch(this)">
  </nav>

  <p id="message">Loading categories...</p>

  <div id="gallery"></div>

  <script>
    let categories = [];
    let allItems = [];
    let searchQuery = "";
    let currentCategory = "";

    function loadCategories() {
      fetch("https://weblabs.web.app/api/amazon/index.json")
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          categories = data;
          renderCategoryOptions();

          if (categories.length > 0) {
            document.getElementById("categorySelect").value = categories[0].path;
            loadProducts(categories[0].path);
          }
        })
        .catch(function(error) {
          document.getElementById("message").innerHTML = "Failed to load categories.";
          console.log(error);
        });
    }

    function renderCategoryOptions() {
      let html = "";

      for (let item of categories) {
        html += `<option value="${item.path}">${item.name}</option>`;
      }

      document.getElementById("categorySelect").innerHTML = html;
    }

    function changeCategory(selectElement) {
      searchQuery = "";
      document.getElementById("search").value = "";
      loadProducts(selectElement.value);
    }

    function loadProducts(path) {
      document.getElementById("message").innerHTML = "Loading products...";

      fetch(path)
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          if (Array.isArray(data)) {
            currentCategory = document.getElementById("categorySelect").options[
              document.getElementById("categorySelect").selectedIndex
            ].text;
            allItems = data;
          } else {
            currentCategory = data.category;
            allItems = data.products;
          }

          refreshGallery();
        })
        .catch(function(error) {
          document.getElementById("message").innerHTML = "Failed to load products.";
          console.log(error);
        });
    }

    function renderGallery(list) {
      const gallery = document.querySelector("#gallery");

      let html = "";
      for (let item of list) {
        html += `
          <div class="card">
            <img src="${item.imgUrl}" alt="${item.title}">
            <h3>${item.title}</h3>
            <p>Price: $${item.price}</p>
            <p>Stars: ${item.stars}</p>
            <a href="${item.productURL}" target="_blank">View Product</a>
          </div>
        `;
      }

      gallery.innerHTML = html;
    }

    function getFilteredList() {
      let filteredList = [...allItems];

      filteredList = filteredList.filter(function(item) {
        return item.title.toLowerCase().includes(searchQuery.toLowerCase());
      });

      return filteredList;
    }

    function refreshGallery() {
      const filteredList = getFilteredList();
      renderGallery(filteredList);
      document.getElementById("message").innerHTML =
        currentCategory + " - Showing " + filteredList.length + " products";
    }

    function handleSearch(inputElement) {
      searchQuery = inputElement.value;
      refreshGallery();
    }

    loadCategories();
  </script>
</body>
</html>
